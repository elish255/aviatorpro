<!-- admin.html – full Firebase integration -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin • Aviator Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{font-family:'Inter',sans-serif;background:#f1f5f9;}</style>
</head>
<body class="p-5">
<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-2xl shadow-md p-6 mb-6 flex justify-between items-center"><h1 class="text-2xl font-black text-red-700"><i class="fas fa-shield-alt mr-2"></i>Admin Panel</h1><button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm"><i class="fas fa-sync-alt mr-1"></i> Refresh</button></div>
    <div id="pendingList"></div>
    <div id="historyList" class="mt-8"></div>
</div>
<script>
    const firebaseConfig = { /* same config */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadSubmissions() {
        const snapshot = await db.collection('submissions').get();
        const pendingDiv = document.getElementById('pendingList');
        if (snapshot.empty) {
            pendingDiv.innerHTML = '<div class="bg-white p-8 text-center">No submissions found. Check Firestore.</div>';
            return;
        }
        let html = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            html += `<div class="bg-white p-4 mb-2 rounded shadow">
                        <strong>${data.fullName}</strong> - ${data.package} - TSh ${data.amount}<br>
                        Status: ${data.status}<br>
                        <button onclick="approve('${doc.id}')">Approve</button>
                        <button onclick="reject('${doc.id}')">Reject</button>
                        <img src="${data.screenshot}" style="max-height:100px">
                    </div>`;
        });
        pendingDiv.innerHTML = html;
    }

    window.approve = async (id) => {
        await db.collection('submissions').doc(id).update({ status: 'approved', decision_date: new Date().toISOString() });
        alert('Approved');
        loadSubmissions();
    };
    window.reject = async (id) => {
        await db.collection('submissions').doc(id).update({ status: 'rejected', decision_date: new Date().toISOString() });
        alert('Rejected');
        loadSubmissions();
    };

    loadSubmissions();
</script>
</body>
</html>
