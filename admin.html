<!-- admin.html – full Firebase integration -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin • Aviator Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{font-family:'Inter',sans-serif;background:#f1f5f9;}</style>
</head>
<body class="p-5">
<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-2xl shadow-md p-6 mb-6 flex justify-between items-center"><h1 class="text-2xl font-black text-red-700"><i class="fas fa-shield-alt mr-2"></i>Admin Panel</h1><button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm"><i class="fas fa-sync-alt mr-1"></i> Refresh</button></div>
    <div id="pendingList"></div>
    <div id="historyList" class="mt-8"></div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAP0PrZlJ2fd6Nbtct8KJPnS3-DFZ6CMns", authDomain: "aviator-predictor-49e48.firebaseapp.com", projectId: "aviator-predictor-49e48", storageBucket: "aviator-predictor-49e48.firebasestorage.app", messagingSenderId: "369153377284", appId: "1:369153377284:web:87e48bbff408118a1ae151" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function generateAppId() { return 'AVIATOR-' + Math.random().toString(36).substr(2, 8).toUpperCase(); }

    async function approveRequest(id, userId, fullName) {
        const appIdCode = generateAppId();
        // Create app_id document
        await db.collection('app_ids').doc(appIdCode).set({
            code: appIdCode,
            userId: userId,
            status: 'active',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        // Update user's document
        await db.collection('users').doc(userId).update({
            hasAppId: true,
            appIdCode: appIdCode,
            appIdPurchasedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        // Update submission status
        await db.collection('submissions').doc(id).update({
            status: 'approved',
            decision_date: firebase.firestore.FieldValue.serverTimestamp(),
            appIdGenerated: appIdCode
        });
        alert(`Approved! App ID: ${appIdCode} assigned to ${fullName}`);
        location.reload();
    }

    async function rejectRequest(id) {
        await db.collection('submissions').doc(id).update({
            status: 'rejected',
            decision_date: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('Rejected');
        location.reload();
    }

    function renderSubmissions() {
        db.collection('submissions').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            let pending = [], history = [];
            snapshot.forEach(doc => {
                let data = doc.data();
                data.id = doc.id;
                if(data.status === 'pending') pending.push(data);
                else history.push(data);
            });
            const pendingDiv = document.getElementById('pendingList');
            if(pending.length===0) pendingDiv.innerHTML = '<div class="bg-white rounded-xl p-8 text-center">✅ No pending submissions</div>';
            else pendingDiv.innerHTML = pending.map(sub => `
                <div class="bg-white rounded-2xl shadow-md p-5 mb-4">
                    <div><strong>${sub.fullName}</strong> | ${sub.package} | TSh ${sub.amount}</div>
                    <div class="text-xs text-gray-500">User ID: ${sub.userId}</div>
                    <img src="${sub.screenshot}" class="max-h-48 my-2 rounded border">
                    <div class="mt-2"><button onclick="approveRequest('${sub.id}','${sub.userId}','${sub.fullName}')" class="bg-green-600 text-white px-4 py-1 rounded-full mr-2">Approve</button><button onclick="rejectRequest('${sub.id}')" class="bg-red-600 text-white px-4 py-1 rounded-full">Reject</button></div>
                </div>
            `).join('');

            const historyDiv = document.getElementById('historyList');
            if(history.length===0) historyDiv.innerHTML = '<div class="bg-white rounded-xl p-8 text-center">📜 No history</div>';
            else historyDiv.innerHTML = '<h2 class="text-xl font-bold mb-3">Transaction History</h2>' + history.map(sub => `
                <div class="bg-white rounded-xl p-4 mb-2 border">
                    <div><span class="font-bold">${sub.fullName}</span> - ${sub.package} - TSh ${sub.amount}</div>
                    <div>Status: ${sub.status.toUpperCase()} | ${sub.decision_date ? new Date(sub.decision_date.toDate()).toLocaleString() : ''}</div>
                    ${sub.appIdGenerated ? `<div>App ID: ${sub.appIdGenerated}</div>` : ''}
                </div>
            `).join('');
        });
    }
    renderSubmissions();
</script>
</body>
</html>
