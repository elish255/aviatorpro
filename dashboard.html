<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Oswald', sans-serif;

    body{
      background:linear-gradient(135deg,#ff1f2d,#ff3131);

    /* floating download app button - top right corner of the viewport */

    .floating-app-btn i {

    }

    .floating-app-btn:active {
      transform: scale(0.97);
    }

    /* modal for download options / direct APK trigger */
    .download-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s ease;
    }

    .download-modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .download-modal-card {
      background: linear-gradient(145deg, #1a1e2c, #0f121f);

      padding: 30px 22px 38px;

      border: 1px solid rgba(255,200,70,0.5);

    @keyframes fadeSlideUp {
      from {
        opacity: 0;

      }
      to {

    .download-modal-card i.fa-android {

    .download-modal-card h3 {

    }

    .download-modal-card p {

    .btn-download-apk {

    .btn-close-modal {

     background:linear-gradient(135deg,#ff1f2d,#ff3131);

    .phone {
      width: 370px;
      max-width: 95%;
      height: 780px;
      background: #f1f1f1;
      border-radius: 40px;
      overflow: hidden;

    .phone.blurred {

    .top{
      background:linear-gradient(135deg,#ff1f2d,#ff3131);
      height:230px;
      position:relative;
      overflow:hidden;
      border-bottom-left-radius: 55px;
      border-bottom-right-radius: 55px;
    }

    .top::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.2), transparent);
      border-bottom-left-radius: 55px;
      border-bottom-right-radius: 55px;
      pointer-events: none;
    }

    .top::before{
      content:'';
      position:absolute;
      width:200%;
      height:100%;
      background:repeating-linear-gradient(
        120deg,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 40px,

        transparent 80px

    @keyframes moveBg{

    .menu{

    .logo h1{
      color:#fff;
      font-size:42px;

      font-weight:700;

    .content{

    @keyframes spin{

    .circle{
      width:220px;
      height:220px;
      border-radius:50%;

      display:flex;

    }

    #odds{
      font-size:72px;
      font-weight:700;
      color:#111;
    }

    .label{
      font-size:24px;
      color:#999;
      margin-top:5px;
    }

    .btn{
      width:100%;
      height:58px;
      border:none;
      border-radius:18px;
      background:#ff2d2d;
      color:#fff;
      font-size:28px;
      font-weight:700;
      cursor:pointer;
      margin-top:30px;
      transition:.2s;
      box-shadow:0 8px 20px rgba(255,0,0,.25);
    }

    .btn:hover{ transform:scale(1.02); }
    .btn:active{ transform:scale(.97); }

    .auto{
      display:flex;
      align-items:center;
      gap:15px;
      margin-top:20px;
      font-size:24px;
      color:#444;
    }

    .auto input{
      width:26px;
      height:26px;
      accent-color:#ff2d2d;
    }

    .bottom{
      position:absolute;
      bottom:50px;
      left:20px;
      right:20px;
      background:#000;
      border-radius:32px;
      padding:18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .bottom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,200,100,0.4), transparent);
      border-radius: 32px;
    }

    .betting-site{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .betting-site img{
      width:65px;
      height:65px;
      border-radius:15px;
      object-fit:cover;
      background:#1a1f2e;
      border:2px solid #ffaa33;
      box-shadow:0 0 0 2px rgba(0,0,0,0.3);
      filter: none;
    }

    .status{
      color:#00d26a;
      font-size:24px;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .time{
      color:#fff;
      font-size:22px;
      margin-top:6px;
      font-family: monospace;
      letter-spacing: 1px;
    }

    @media(max-width:420px){
      .phone{ width:100%; height:100vh; border-radius:0; }
      .logo h1{ font-size:34px; }
      #odds{ font-size:58px; }
      .btn{ font-size:26px; height:54px; }
      .auto{ font-size:22px; }
      .status{ font-size:22px; }
      .time{ font-size:20px; }
      .floating-app-btn { padding: 8px 18px; font-size: 0.9rem; top: 12px; right: 12px; }
      .floating-app-btn i { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- floating button: Get the App (APK download) -->
<button class="floating-app-btn" id="getAppApkBtn">

<div class="phone" id="dashboardPhone">
  <div class="top">

    <div class="logo">
      <img src="plane.png" alt="Plane" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27white%27%3E%3Cpath d=%27M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z%27/%3E%3C/svg%3E'">

<!-- Download Modal (for APK trigger) -->
<div id="downloadModal" class="download-modal-overlay">
  <div class="download-modal-card">
    <i class="fab fa-android"></i>
    <h3>Aviator Predictor APK</h3>
    <p>Get the official app for faster predictions, real-time alerts and exclusive features. Download the latest version.</p>
    <button id="confirmDownloadBtn" class="btn-download-apk">
      <i class="fas fa-download"></i> Download APK
    </button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAP0PrZlJ2fd6Nbtct8KJPnS3-DFZ6CMns",
    authDomain: "aviator-predictor-49e48.firebaseapp.com",
    projectId: "aviator-predictor-49e48",
    storageBucket: "aviator-predictor-49e48.firebasestorage.app",
    messagingSenderId: "369153377284",
    appId: "1:369153377284:web:87e48bbff408118a1ae151",
    measurementId: "G-7WHZWJRP4Z"
  };
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  function getDeviceId() {
    let deviceId = localStorage.getItem("device_id");
    if (!deviceId) {
      deviceId = crypto.randomUUID();
      localStorage.setItem("device_id", deviceId);
    }
    return deviceId;
  }
  
  let isAuthenticated = sessionStorage.getItem("dashboard_authenticated") === "true";
  
  // Function to show App ID modal (can be called anytime)
  let pendingOddsGeneration = false;
  
  function showPasskeyModal(onSuccessCallback) {
    // Store callback for after successful verification
    const callback = onSuccessCallback || null;
    
    const overlay = document.createElement('div');
    overlay.className = 'blur-overlay';
    overlay.innerHTML = `
      <div class="passkey-modal">
        <h2>🔐 Enter App ID</h2>
        <p style="margin-bottom:5px; opacity:0.9;">Enter your valid App ID to access predictor</p>
        <input type="text" id="passkeyInput" placeholder="Enter App ID" autocomplete="off">
        <button id="verifyPasskeyBtn">VERIFY</button>
        <div class="error-msg" id="passkeyError">Invalid App ID. Please try again.</div>
        <div class="support-text">
          <i class="fas fa-headset"></i> Need support? Contact us on WhatsApp
        </div>
        <button class="get-appid-btn" id="getAppIdBtn">
          <i class="fab fa-whatsapp"></i> GET APP ID HERE 
          /
        PATA APP ID HAPA</button>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('dashboardPhone').classList.add('blurred');
    
    const input = document.getElementById('passkeyInput');
    const verifyBtn = document.getElementById('verifyPasskeyBtn');
    const errorDiv = document.getElementById('passkeyError');
    const getAppIdBtn = document.getElementById('getAppIdBtn');
    
    getAppIdBtn.onclick = () => {
      window.location.href = "package1.html";
    };
    
    async function verifyAppID() {
      const appId = input.value.trim();
      const deviceId = getDeviceId();
      
      if (!appId) {
        errorDiv.innerText = "Please enter App ID";
        errorDiv.style.display = "block";
        return;
      }
      
      verifyBtn.disabled = true;
      verifyBtn.textContent = "Verifying...";
      
      try {
        const doc = await db.collection("app_ids").doc(appId).get();
        
        if (!doc.exists || doc.data().status !== "active") {
          errorDiv.innerText = "Invalid App ID. Please try again.";
          errorDiv.style.display = "block";
          verifyBtn.disabled = false;
          verifyBtn.textContent = "VERIFY";
          return;
        }
        
        const data = doc.data();
        
        if (!data.deviceId) {
          await db.collection("app_ids").doc(appId).update({ deviceId: deviceId });
          authenticateSuccess(overlay, callback);
          return;
        }
        
        if (data.deviceId === deviceId) {
          authenticateSuccess(overlay, callback);
          return;
        }
        
        errorDiv.innerText = "This App ID is already used on another device.";
        errorDiv.style.display = "block";
        verifyBtn.disabled = false;
        verifyBtn.textContent = "VERIFY";
        
      } catch(err) {
        errorDiv.innerText = "Connection error. Try again.";
        errorDiv.style.display = "block";
        verifyBtn.disabled = false;
        verifyBtn.textContent = "VERIFY";
      }
    }
    
    function authenticateSuccess(overlay, callback) {
      sessionStorage.setItem("dashboard_authenticated", "true");
      isAuthenticated = true;
      document.getElementById('dashboardPhone').classList.remove('blurred');
      overlay.remove();
      
      // Execute callback if provided
      if (callback && typeof callback === 'function') {
        callback();
      }
    }
    
    verifyBtn.onclick = verifyAppID;
    input.onkeypress = (e) => { if(e.key === 'Enter') verifyAppID(); };
    
    errorDiv.style.display = "none";
  }
  
  // Function to generate odds (protected)
  function generateOdds(){
    let value = (Math.random() * 18.8 + 1.2).toFixed(2);
    document.getElementById('odds').innerHTML = value + 'x';
  }
  
  // Handle Next Odds button click - show App ID modal if not authenticated
  const nextOddsBtn = document.getElementById('nextOddsBtn');
  
  function handleNextOdds() {
    if (isAuthenticated) {
      generateOdds();
    } else {
      // Show App ID modal, then generate odds after successful verification
      showPasskeyModal(function() {
        generateOdds();
      });
    }
  }
  
  if (nextOddsBtn) {
    nextOddsBtn.onclick = handleNextOdds;
  }
  
  // Auto-update also needs authentication check
  setInterval(() => {
    let auto = document.getElementById('autoUpdate');
    if(auto && auto.checked && isAuthenticated){
      generateOdds();
    }
  }, 3000);
  
 
  // Initial authentication check (optional - can be removed if you want only on button click)
  // Removing auto popup on load to only trigger on Next Odds click
  // But keep for first-time users who haven't authenticated
  setTimeout(() => {
    if (!isAuthenticated) {
      // Optional: show only once on first visit
      // showPasskeyModal(null);
    }
  }, 3000);
  
  const PACKAGES_PAGE_URL = "packages.html";
  
  // ---------- APK download logic (user clicks "GET THE APP") ----------
  const getAppBtn = document.getElementById('getAppApkBtn');
  const downloadModal = document.getElementById('downloadModal');
  const confirmDownloadBtn = document.getElementById('confirmDownloadBtn');
  const closeModalBtn = document.getElementById('closeDownloadModalBtn');
  
  // APK filename - place your APK file in the website root folder
  const APK_FILE_PATH = "./Aviator predictor pro.apk";
  
  function showDownloadModal() {
    if (downloadModal) {
      downloadModal.classList.add('active');
    }
  }
  
  function hideDownloadModal() {
    if (downloadModal) {
      downloadModal.classList.remove('active');
    }
  }
  
  function downloadApk() {
    try {
      const link = document.createElement('a');
      link.href = APK_FILE_PATH;
      link.download = 'Aviator predictor pro.apk';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      console.log('APK download triggered');
    } catch (err) {
      window.location.href = APK_FILE_PATH;
    }
    hideDownloadModal();
  }
  
  if (getAppBtn) {
    getAppBtn.addEventListener('click', (e) => {
      e.preventDefault();
      showDownloadModal();
    });
  }
  
  if (confirmDownloadBtn) {
    confirmDownloadBtn.addEventListener('click', (e) => {
      e.preventDefault();
      downloadApk();
    });
  }
  
  if (closeModalBtn) {
    closeModalBtn.addEventListener('click', () => {
      hideDownloadModal();
    });
  }
  
  if (downloadModal) {
    downloadModal.addEventListener('click', (e) => {
      if (e.target === downloadModal) {
        hideDownloadModal();
      }
    });
  }
  
  let selectedSiteImage = "betting-site.jpg";
  try {
    const storedSite = sessionStorage.getItem('selectedBettingSite');
    if (storedSite) {
      const siteData = JSON.parse(storedSite);
      if (siteData && siteData.imgSrc) {
        selectedSiteImage = siteData.imgSrc;
      }
    }
  } catch(e) {}
  
  const siteImgElement = document.getElementById('siteImage');
  if (siteImgElement) {
    siteImgElement.src = selectedSiteImage;
    siteImgElement.onerror = function() {
      this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffaa44'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E";
      this.style.background = "#1e2233";
      this.style.padding = "4px";
    };
  }
  
  let seconds = 0;
  function updateTimer(){
    seconds++;
    let hrs = String(Math.floor(seconds / 3600)).padStart(2,'0');
    let mins = String(Math.floor((seconds % 3600) / 60)).padStart(2,'0');
    let secs = String(seconds % 60).padStart(2,'0');
    document.getElementById('timer').innerHTML = `${hrs} : ${mins} : ${secs}`;
  }
  setInterval(updateTimer, 1000);
  document.getElementById('timer').innerHTML = "00 : 00 : 00";
</script>

</body>
</html>
