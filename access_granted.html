<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malipo Yamekubaliwa • Aviator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#ff1f2d,#ff3131);}</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">
    <div class="bg-white rounded-2xl shadow-2xl p-8 text-center max-w-md w-full">
        <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check-circle text-green-600 text-4xl"></i>
        </div>
        <h2 class="text-2xl font-black text-green-700">Malipo Yamekubaliwa!</h2>
        <p class="text-gray-600 mt-2">Hongera! Malipo yako yamethibitishwa.</p>
        <div id="dynamicMessage" class="mt-4 p-3 bg-blue-50 rounded-xl text-sm">
            <!-- dynamic content based on package type -->
        </div>
        <div class="mt-6 flex gap-3 justify-center">
            <button onclick="window.location.href='dashboard.html'" class="bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold">← Dashboard</button>
            <button onclick="window.open('https://wa.me/255652048044','_blank')" class="bg-green-500 text-white px-6 py-2 rounded-full text-sm font-bold"><i class="fab fa-whatsapp mr-1"></i> Help</button>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const amount = urlParams.get('amount');
        const msgDiv = document.getElementById('dynamicMessage');
        if(type === 'app_id') {
            msgDiv.innerHTML = `<strong>Msimbo wako wa App ID:</strong> <span class="font-mono bg-white px-2 py-1 rounded border">AVIATOR-APP-${Math.floor(Math.random()*10000)}</span><br>Unaweza kuingia app na kutumia huduma kwa siku 7.`;
        } else if(type === 'vpn') {
            msgDiv.innerHTML = `<strong>Config ya VPN imetumwa kwa WhatsApp yako.</strong><br>Tafadhali angalia ujumbe kutoka kwa Admin. Endelea kufurahia browsing salama.`;
        } else if(type === 'connect') {
            msgDiv.innerHTML = `<strong>Akaunti yako imeunganishwa kikamilifu!</strong><br>Sasa una access ya VIP na msaada wa kipaumbele.`;
        } else {
            msgDiv.innerHTML = `Malipo yako yamethibitishwa. Utapokea maelekezo zaidi kwa WhatsApp.`;
        }
        <!-- access_granted.html – add redirect to dashboard after 20: seconds -->
    // existing success message
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 20000);
    </script>
</body>
</html>
