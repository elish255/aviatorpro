<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malipo Yamekubaliwa • Aviator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#ff1f2d,#ff3131);}</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">
    <div class="bg-white rounded-2xl shadow-2xl p-8 text-center max-w-md w-full">
        <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check-circle text-green-600 text-4xl"></i>
        </div>
        <h2 class="text-2xl font-black text-green-700">Malipo Yamekubaliwa!</h2>
        <p class="text-gray-600 mt-2">Hongera! Malipo yako yamethibitishwa.</p>
        <div id="dynamicMessage" class="mt-4 p-3 bg-blue-50 rounded-xl text-sm">
            Inapakua...
        </div>
        <div class="mt-6 flex gap-3 justify-center">
            <button id="dashboardBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold">← Dashboard</button>
            <button onclick="window.open('https://wa.me/255652048044','_blank')" class="bg-green-500 text-white px-6 py-2 rounded-full text-sm font-bold"><i class="fab fa-whatsapp mr-1"></i> Help</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAP0PrZlJ2fd6Nbtct8KJPnS3-DFZ6CMns",
            authDomain: "aviator-predictor-49e48.firebaseapp.com",
            projectId: "aviator-predictor-49e48",
            storageBucket: "aviator-predictor-49e48.firebasestorage.app",
            messagingSenderId: "369153377284",
            appId: "1:369153377284:web:87e48bbff408118a1ae151"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const requestId = urlParams.get('requestId');
        const msgDiv = document.getElementById('dynamicMessage');

        let redirectUrl = 'dashboard.html';
        let successText = '';

        // CORRECT REDIRECTS BASED ON PACKAGE TYPE
        if (type === 'app_id') {
            redirectUrl = 'package2.html';
            successText = 'Msimbo wako wa App ID umetolewa. Unaelekezwa kwenye ukurasa wa VPN...';
        } else if (type === 'vpn') {
            redirectUrl = 'package3.html';
            successText = 'VPN yako imeamilishwa. Unaelekezwa kwenye kuunganisha akaunti...';
        } else if (type === 'connect') {
            redirectUrl = 'dashboard.html';
            successText = 'Akaunti yako imeunganishwa kikamilifu! Unaelekezwa kwenye dashibodi...';
        } else {
            redirectUrl = 'dashboard.html';
            successText = 'Malipo yamethibitishwa. Unaelekezwa kwenye dashibodi...';
        }

        async function fetchAppId() {
            if (type === 'app_id' && requestId) {
                try {
                    const doc = await db.collection('submissions').doc(requestId).get();
                    if (doc.exists && doc.data().appIdGenerated) {
                        return doc.data().appIdGenerated;
                    }
                } catch (err) { console.error(err); }
            }
            return null;
        }

        async function init() {
            let displayMsg = successText;
            if (type === 'app_id') {
                const appId = await fetchAppId();
                if (appId) {
                    displayMsg = `<strong>Msimbo wako wa App ID:</strong> <span class="font-mono bg-white px-2 py-1 rounded border">${appId}</span><br>Unaelekezwa kwenye ukurasa wa VPN...`;
                } else {
                    displayMsg = `<strong>Msimbo wako wa App ID umetumwa kwa WhatsApp.</strong><br>Unaelekezwa kwenye ukurasa wa VPN...`;
                }
            } else if (type === 'vpn') {
                displayMsg = `<strong>Config ya VPN imetumwa kwa WhatsApp yako.</strong><br>Unaelekezwa kwenye kuunganisha akaunti...`;
            } else if (type === 'connect') {
                displayMsg = `<strong>Akaunti yako imeunganishwa kikamilifu!</strong><br>Unaelekezwa kwenye dashibodi...`;
            }
            msgDiv.innerHTML = displayMsg;

            // Redirect after 5 seconds
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 5000);
        }

        document.getElementById('dashboardBtn').onclick = () => {
            window.location.href = 'dashboard.html';
        };

        init();
    </script>
</body>
</html>
