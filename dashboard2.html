<!-- dashboard.html – with Firebase integration and sequential package buttons -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aviator Predictor • Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        /* Same as your original dashboard styles – keep as is */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Oswald', sans-serif; }
        body { background:linear-gradient(135deg,#ff1f2d,#ff3131); display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
        .phone { width:370px; max-width:95%; height:780px; background:#f1f1f1; border-radius:40px; overflow:hidden; position:relative; box-shadow:0 0 40px rgba(0,0,0,.8); border:5px solid #111; }
        .top { background:linear-gradient(135deg,#ff1f2d,#ff3131); height:230px; position:relative; overflow:hidden; border-bottom-left-radius:55px; border-bottom-right-radius:55px; }
        .top::before { content:''; position:absolute; width:200%; height:100%; background:repeating-linear-gradient(120deg, rgba(255,255,255,.05), rgba(255,255,255,.05) 40px, transparent 40px, transparent 80px); animation:moveBg 8s linear infinite; }
        @keyframes moveBg{ from{ transform:translateX(0); } to{ transform:translateX(-200px); } }
        .menu{ position:absolute; top:30px; left:25px; font-size:28px; color:#fff; z-index:2; }
        .wallet{ position:absolute; top:30px; right:25px; font-size:24px; color:#fff; z-index:2; }
        .logo{ position:absolute; top:65px; left:50%; transform:translateX(-50%); text-align:center; z-index:2; }
        .logo img{ width:110px; animation:planeFly 2s ease-in-out infinite alternate; }
        @keyframes planeFly{ from{ transform:translateY(0px) rotate(-2deg); } to{ transform:translateY(-8px) rotate(2deg); } }
        .logo h1{ color:#fff; font-size:42px; font-style:italic; font-weight:700; text-shadow:0 3px 10px rgba(0,0,0,.2); }
        .content{ padding:20px; margin-top:-20px; position:relative; z-index:5; }
        .predict-box{ width:280px; height:280px; margin:auto; position:relative; display:flex; justify-content:center; align-items:center; }
        .spinner{ position:absolute; width:100%; height:100%; border-radius:50%; border:14px solid rgba(0,255,128,.15); border-top:14px solid #00ff88; animation:spin 2s linear infinite; }
        @keyframes spin{ 100%{ transform:rotate(360deg); } }
        .circle{ width:220px; height:220px; border-radius:50%; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; box-shadow:0 10px 30px rgba(0,0,0,.12); z-index:2; }
        #odds{ font-size:72px; font-weight:700; color:#111; }
        .label{ font-size:24px; color:#999; margin-top:5px; }
        .btn{ width:100%; height:58px; border:none; border-radius:18px; background:#ff2d2d; color:#fff; font-size:28px; font-weight:700; cursor:pointer; margin-top:30px; transition:.2s; box-shadow:0 8px 20px rgba(255,0,0,.25); }
        .auto{ display:flex; align-items:center; gap:15px; margin-top:20px; font-size:24px; color:#444; }
        .auto input{ width:26px; height:26px; accent-color:#ff2d2d; }
        .bottom{ position:absolute; bottom:50px; left:20px; right:20px; background:#000; border-radius:32px; padding:18px 20px; display:flex; align-items:center; justify-content:space-between; }
        .betting-site{ display:flex; align-items:center; gap:15px; }
        .betting-site img{ width:65px; height:65px; border-radius:15px; object-fit:cover; background:#1a1f2e; border:2px solid #ffaa33; }
        .status{ color:#00d26a; font-size:24px; font-weight:600; display:flex; align-items:center; gap:6px; }
        .time{ color:#fff; font-size:22px; margin-top:6px; font-family: monospace; }
        .package-buttons { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .package-btn { background: #1a2a6c; color: white; padding: 10px 15px; border-radius: 40px; font-size: 14px; font-weight: bold; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
        .package-btn.disabled { background: #555; cursor: not-allowed; opacity: 0.6; pointer-events: none; }
        .message { background: #fff3cd; color: #856404; padding: 10px; border-radius: 12px; font-size: 12px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
<div class="phone" id="dashboardPhone">
    <div class="top">
        <div class="menu">☰</div>
        <div class="wallet">⌂</div>
        <div class="logo"><img src="plane.png" alt="Plane" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27white%27%3E%3Cpath d=%27M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z%27/%3E%3C/svg%3E'"><h1>Aviator Predictor</h1></div>
    </div>
    <div class="content">
        <div class="predict-box"><div class="spinner"></div><div class="circle"><div id="odds">1.00x</div><div class="label">Coefficient</div></div></div>
        <button class="btn" id="nextOddsBtn">Next Odds</button>
        <div class="auto"><label><input type="checkbox" id="autoUpdate"> Auto-update (3s)</label></div>
        <div id="packageButtons" class="package-buttons"></div>
        <div id="infoMessage" class="message"></div>
    </div>
    <div class="bottom"><div class="betting-site"><img id="siteImage" src="betting-site.jpg" alt="Site"><div><div class="status">● Connected</div><div class="time" id="timer">00 : 00 : 00</div></div></div></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAP0PrZlJ2fd6Nbtct8KJPnS3-DFZ6CMns", authDomain: "aviator-predictor-49e48.firebaseapp.com", projectId: "aviator-predictor-49e48", storageBucket: "aviator-predictor-49e48.firebasestorage.app", messagingSenderId: "369153377284", appId: "1:369153377284:web:87e48bbff408118a1ae151" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userId = sessionStorage.getItem('userId');
    if (!userId) window.location.href = 'index.html';

    let userData = { hasAppId: false, hasVpn: false, hasAccountConnected: false, appIdCode: null };

    async function loadUserData() {
        const doc = await db.collection('users').doc(userId).get();
        if (doc.exists) userData = doc.data();
        updateButtons();
    }

    function updateButtons() {
        const container = document.getElementById('packageButtons');
        let html = '';
        if (!userData.hasAppId) {
            html += `<a href="package1.html" class="package-btn">🎮 Get App ID (TSh 16,000)</a>`;
        } else if (userData.hasAppId && !userData.hasVpn) {
            html += `<a href="package2.html" class="package-btn">🔒 Get VPN (TSh 30,000)</a>`;
        } else if (userData.hasVpn && !userData.hasAccountConnected) {
            html += `<a href="package3.html" class="package-btn">🔗 Connect Account (TSh 50,000)</a>`;
        } else {
            html += `<span class="package-btn disabled">✅ All services active</span>`;
        }
        container.innerHTML = html;

        const msgDiv = document.getElementById('infoMessage');
        if (!userData.hasAppId) msgDiv.innerHTML = "⚠️ You need an App ID to generate odds. Click 'Get App ID' above.";
        else if (userData.hasAppId && !userData.hasVpn) msgDiv.innerHTML = "🔐 App ID active! Now you can get VPN for full security.";
        else if (userData.hasVpn && !userData.hasAccountConnected) msgDiv.innerHTML = "✅ VPN active! Finally, connect your account for VIP features.";
        else msgDiv.innerHTML = "🎉 Full access granted! Enjoy unlimited predictions.";
    }

    loadUserData();

    // Odds generation (only if hasAppId)
    let oddsUnlocked = false;
    async function checkOddsAccess() {
        const doc = await db.collection('users').doc(userId).get();
        oddsUnlocked = doc.exists && doc.data().hasAppId === true;
        if (!oddsUnlocked) document.getElementById('nextOddsBtn').disabled = true;
        else document.getElementById('nextOddsBtn').disabled = false;
    }
    checkOddsAccess();

    function generateOdds() {
        if (!oddsUnlocked) return;
        let value = (Math.random() * 18.8 + 1.2).toFixed(2);
        document.getElementById('odds').innerHTML = value + 'x';
    }
    document.getElementById('nextOddsBtn').onclick = () => { if(oddsUnlocked) generateOdds(); };
    setInterval(() => {
        if(document.getElementById('autoUpdate').checked && oddsUnlocked) generateOdds();
    }, 3000);

    // Timer and site image
    let seconds = 0;
    function updateTimer() { seconds++; let hrs=String(Math.floor(seconds/3600)).padStart(2,'0'); let mins=String(Math.floor((seconds%3600)/60)).padStart(2,'0'); let secs=String(seconds%60).padStart(2,'0'); document.getElementById('timer').innerHTML = `${hrs} : ${mins} : ${secs}`; }
    setInterval(updateTimer, 1000);
    const storedSite = sessionStorage.getItem('selectedBettingSite');
    if(storedSite) {
        let siteData = JSON.parse(storedSite);
        document.getElementById('siteImage').src = siteData.imgSrc;
    }
</script>
</body>
</html>
