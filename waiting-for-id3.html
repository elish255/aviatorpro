<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inasubiri Uthibitisho • App ID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #ff1f2d, #ff3131); }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 4px solid #f59e0b; width: 48px; height: 48px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">
    <div class="bg-white rounded-2xl shadow-2xl p-8 text-center max-w-md w-full">
        <div class="spinner"></div>
        <h2 class="text-2xl font-black text-red-700">Malipo yanachakatwa...</h2>
        <p class="text-gray-600 mt-2">Umeomba <strong>App ID (TSh 16,000)</strong>. Tunathibitisha malipo yako. Utapokea msimbo wako kwa WhatsApp ndani ya dakika chache.</p>
        <p class="text-xs text-gray-400 mt-4">Ukisubiri kwa muda mrefu, wasiliana nasi kupitia WhatsApp.</p>
        <div class="mt-6 flex gap-3 justify-center">
            <button onclick="window.location.href='dashboard.html'" class="bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold">← Dashboard</button>
            <button onclick="window.open('https://wa.me/255652048044','_blank')" class="bg-green-500 text-white px-6 py-2 rounded-full text-sm font-bold"><i class="fab fa-whatsapp mr-1"></i> Wasiliana</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        // Get unique ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const requestId = urlParams.get('id');
        if (!requestId) {
            // If no ID, go back
            window.location.href = 'package1.html';
        }

        // Poll localStorage every 2 seconds
        const checkInterval = setInterval(() => {
            const submissions = JSON.parse(localStorage.getItem('aviator_submissions') || '{}');
            const myRequest = submissions[requestId];
            if (myRequest && myRequest.status === 'approved') {
                clearInterval(checkInterval);
                // Redirect to success page (e.g., access_granted.html) with type
                window.location.href = `access_granted.html?type=app_id&amount=16000`;
            } else if (myRequest && myRequest.status === 'rejected') {
                clearInterval(checkInterval);
                alert("Malipo yako yamekataliwa. Tafadhali wasiliana na Admin.");
                window.location.href = 'package1.html';
            }
        }, 2000);
    </script>
</body>
</html>
