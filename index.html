<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login | Aviator Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ff1f2d, #ff3131);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background pattern */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                120deg,
                rgba(255,255,255,.05),
                rgba(255,255,255,.05) 40px,
                transparent 40px,
                transparent 80px
            );
            animation: moveBg 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes moveBg {
            from { transform: translateX(0); }
            to { transform: translateX(-200px); }
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease;
            position: relative;
            z-index: 1;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff1f2d, #ff3131);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: planeFly 3s ease-in-out infinite;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .logo-icon i {
            font-size: 50px;
            color: white;
        }
        
        @keyframes planeFly {
            0%, 100% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
        
        .logo h1 {
            font-size: 2.5rem;
            color: #b21f1f;
            margin-top: 10px;
            letter-spacing: 2px;
        }
        
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .input-group label i {
            color: #ff1f2d;
            margin-right: 8px;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 60px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: white;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #ff1f2d;
            box-shadow: 0 0 0 3px rgba(255,31,45,0.1);
        }
        
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #ffe6e6;
            color: #e74c3c;
            padding: 12px 15px;
            border-radius: 15px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            text-align: left;
            border-left: 4px solid #e74c3c;
        }
        
        .error-message i {
            margin-right: 8px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info-text {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .info-text i {
            color: #27ae60;
            font-size: 1rem;
        }
        
        /* Demo email hint */
        .demo-hint {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #999;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 35px 25px;
                margin: 15px;
            }
            .logo h1 {
                font-size: 2rem;
            }
            .logo-icon {
                width: 80px;
                height: 80px;
            }
            .logo-icon i {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-plane"></i>
            </div>
            <h1>Aviator Predictor</h1>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="emailInput" placeholder="youremail@gmail.com" autocomplete="email" value="">
        </div>
        
        <button class="login-btn" id="loginBtn">
            <i class="fas fa-paper-plane"></i> Continue
        </button>
        
        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">Authentication error. Please try again.</span>
        </div>
        
        
      
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAP0PrZlJ2fd6Nbtct8KJPnS3-DFZ6CMns",
            authDomain: "aviator-predictor-49e48.firebaseapp.com",
            projectId: "aviator-predictor-49e48",
            storageBucket: "aviator-predictor-49e48.firebasestorage.app",
            messagingSenderId: "369153377284",
            appId: "1:369153377284:web:87e48bbff408118a1ae151"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('emailInput');
        const errorMessageDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        
        // Function to save user to Firestore
        async function saveUserToFirestore(userId, email) {
            const userRef = db.collection('users').doc(userId);
            const userDoc = await userRef.get();
            
            if (!userDoc.exists) {
                await userRef.set({
                    email: email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    paymentApproved: false,
                    appIdUsed: false,
                    vpnApproved: false,
                    accountConnected: false
                });
                console.log('New user created in Firestore');
            } else {
                console.log('User already exists in Firestore');
            }
        }
        
        // Function to show error
        function showError(message) {
            errorText.textContent = message;
            errorMessageDiv.style.display = 'block';
            setTimeout(() => {
                errorMessageDiv.style.display = 'none';
            }, 5000);
        }
        
        // Function to hide error
        function hideError() {
            errorMessageDiv.style.display = 'none';
        }
        
        // Function to check user progress and redirect
        async function redirectBasedOnProgress(userId) {
            const userDoc = await db.collection('users').doc(userId).get();
            const userData = userDoc.data();
            
            console.log('User data:', userData);
            
            if (!userData) {
                window.location.href = 'index1.html';
                return;
            }
            
            // Redirect based on user progress
            if (userData.paymentApproved && userData.appId && !userData.appIdUsed) {
                // User has App ID but not used yet
                window.location.href = 'waiting-for-id.html';
            } else if (userData.appIdUsed && !userData.vpnApproved) {
                // User has used App ID but VPN not approved
                window.location.href = 'dashboard.html';
            } else if (userData.vpnApproved && !userData.accountConnected) {
                // VPN approved but account not connected
                window.location.href = 'connect-account.html';
            } else if (userData.accountConnected) {
                // Fully set up, go to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // New user, go to packages
                window.location.href = 'index1.html';
            }
        }
        
        // Login button click handler
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim().toLowerCase();
            
            // Validate email
            if (!email) {
                showError('Please enter your email address');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showError('Please enter a valid email address (e.g., name@example.com)');
                return;
            }
            
            hideError();
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Processing...';
            
            try {
                // Try to sign in with email and a temporary password
                let userCredential;
                const tempPassword = email + '_temp_' + Date.now();
                
                try {
                    // Attempt to sign in
                    userCredential = await auth.signInWithEmailAndPassword(email, tempPassword);
                    console.log('Existing user signed in');
                } catch (signInError) {
                    if (signInError.code === 'auth/user-not-found') {
                        // User doesn't exist, create new account
                        userCredential = await auth.createUserWithEmailAndPassword(email, tempPassword);
                        console.log('New user created');
                    } else if (signInError.code === 'auth/wrong-password') {
                        // Try with a different approach - just create if doesn't work
                        userCredential = await auth.createUserWithEmailAndPassword(email, tempPassword);
                        console.log('Created new user after wrong-password');
                    } else {
                        throw signInError;
                    }
                }
                
                const user = userCredential.user;
                await saveUserToFirestore(user.uid, email);
                
                // Store user info in session
                sessionStorage.setItem('userEmail', email);
                sessionStorage.setItem('userId', user.uid);
                
                // Redirect based on progress
                await redirectBasedOnProgress(user.uid);
                
            } catch (error) {
                console.error('Authentication error:', error);
                
                let errorMessage = 'Authentication error. Please try again.';
                if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email format. Please enter a valid email address.';
                } else if (error.code === 'auth/operation-not-allowed') {
                    errorMessage = 'Email/password sign-in is disabled. Please contact support.';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = 'Network error. Please check your internet connection.';
                }
                
                showError(errorMessage);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Continue';
            }
        });
        
        // Enter key support
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });
        
        // Check if user is already logged in on page load
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                console.log('User already logged in:', user.email);
                sessionStorage.setItem('userEmail', user.email);
                sessionStorage.setItem('userId', user.uid);
                await redirectBasedOnProgress(user.uid);
            }
        });
        
        // Pre-fill demo email if needed
        const demoEmail = localStorage.getItem('demoEmail');
        if (demoEmail && !emailInput.value) {
            emailInput.value = demoEmail;
        }
    </script>
</body>
</html>
