<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Waiting for App ID | Aviator Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ff1f2d, #ff3131);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                120deg,
                rgba(255,255,255,.05),
                rgba(255,255,255,.05) 40px,
                transparent 40px,
                transparent 80px
            );
            animation: moveBg 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes moveBg {
            from { transform: translateX(0); }
            to { transform: translateX(-200px); }
        }
        
        .waiting-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .spinner-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
        }
        
        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 5px solid rgba(255,31,45,0.2);
            border-radius: 50%;
            border-top-color: #ff1f2d;
            animation: spin 1.5s linear infinite;
        }
        
        .spinner-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 5px solid transparent;
            border-radius: 50%;
            border-right-color: #1a2a6c;
            animation: spinReverse 2s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes spinReverse {
            to { transform: rotate(-360deg); }
        }
        
        .plane-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45px;
            color: #b21f1f;
            animation: bounce 1s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-10px); }
        }
        
        h2 {
            color: #b21f1f;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        
        .waiting-text {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .app-id-display {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 25px;
            padding: 25px;
            margin: 20px 0;
            display: none;
            animation: slideDown 0.5s ease;
            border: 2px solid #27ae60;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .app-id-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .app-id-code {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1a2a6c;
            font-family: 'Courier New', monospace;
            background: white;
            padding: 12px;
            border-radius: 15px;
            letter-spacing: 2px;
            word-break: break-all;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .copy-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .copy-btn:hover {
            background: #219a52;
            transform: scale(1.05);
        }
        
        .use-btn {
            background: #1a2a6c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .use-btn:hover {
            background: #b21f1f;
            transform: scale(1.05);
        }
        
        .check-btn {
            background: #f39c12;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .check-btn:hover {
            background: #e67e22;
            transform: scale(1.05);
        }
        
        .status-message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 15px;
            font-size: 0.9rem;
        }
        
        .status-message.info {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status-message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status-message.warning {
            background: #fff3e0;
            color: #e65100;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .pulse-text {
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @media (max-width: 480px) {
            .waiting-container {
                padding: 35px 25px;
                margin: 15px;
            }
            .app-id-code {
                font-size: 1.2rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="waiting-container">
        <div class="spinner-container">
            <div class="spinner"></div>
            <div class="spinner-inner"></div>
            <i class="fas fa-plane plane-icon"></i>
        </div>
        
        <h2>⏳ Waiting for App ID</h2>
        <p class="waiting-text">Your payment is being reviewed by admin.<br>Once approved, your App ID will appear below.</p>
        
        <div id="appIdDisplay" class="app-id-display">
            <div class="app-id-label">
                <i class="fas fa-key"></i> Your App ID
            </div>
            <div class="app-id-code" id="appIdCode">XXXXXXXX</div>
            <div class="btn-group">
                <button class="copy-btn" onclick="copyAppId()">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button class="use-btn" onclick="useAppId()">
                    <i class="fas fa-unlock-alt"></i> Use App ID
                </button>
            </div>
        </div>
        
        <button class="check-btn" onclick="checkStatus()">
            <i class="fas fa-sync-alt"></i> Check Status
        </button>
        
        <div id="statusMessage" class="status-message info">
            <i class="fas fa-info-circle"></i> Checking for approval...
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAP0PrZlJ2fd6Nbtct8KJPnS3-DFZ6CMns",
            authDomain: "aviator-predictor-49e48.firebaseapp.com",
            projectId: "aviator-predictor-49e48",
            storageBucket: "aviator-predictor-49e48.firebasestorage.app",
            messagingSenderId: "369153377284",
            appId: "1:369153377284:web:87e48bbff408118a1ae151"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUserId = null;
        let checkInterval = null;
        
        function updateStatusMessage(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status-message ${type}`;
            let icon = '<i class="fas fa-info-circle"></i>';
            if (type === 'success') icon = '<i class="fas fa-check-circle"></i>';
            if (type === 'warning') icon = '<i class="fas fa-exclamation-triangle"></i>';
            statusDiv.innerHTML = `${icon} ${message}`;
        }
        
        async function checkStatus() {
            if (!currentUserId) {
                const user = auth.currentUser;
                if (user) {
                    currentUserId = user.uid;
                } else {
                    updateStatusMessage('Please login again', 'warning');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    return;
                }
            }
            
            updateStatusMessage('Checking for App ID approval...', 'info');
            
            try {
                const userDoc = await db.collection('users').doc(currentUserId).get();
                const userData = userDoc.data();
                
                if (userData && userData.appId && userData.paymentApproved && !userData.appIdUsed) {
                    // Show App ID
                    const appIdDisplay = document.getElementById('appIdDisplay');
                    const appIdCode = document.getElementById('appIdCode');
                    appIdCode.textContent = userData.appId;
                    appIdDisplay.style.display = 'block';
                    updateStatusMessage('✅ App ID is ready! Copy and use it to continue.', 'success');
                    
                    // Stop auto-checking
                    if (checkInterval) {
                        clearInterval(checkInterval);
                        checkInterval = null;
                    }
                } else if (userData && userData.appIdUsed) {
                    updateStatusMessage('App ID already used. Redirecting to dashboard...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    updateStatusMessage('⏳ Still waiting for admin approval. Please check again later.', 'warning');
                }
            } catch (error) {
                console.error('Error checking status:', error);
                updateStatusMessage('Error checking status. Please try again.', 'warning');
            }
        }
        
        async function useAppId() {
            if (!currentUserId) return;
            
            const useBtn = document.querySelector('.use-btn');
            useBtn.disabled = true;
            useBtn.innerHTML = '<span class="loading-spinner" style="display:inline-block;"></span> Processing...';
            
            try {
                const userDoc = await db.collection('users').doc(currentUserId).get();
                const userData = userDoc.data();
                
                if (userData && userData.appId && !userData.appIdUsed) {
                    await db.collection('users').doc(currentUserId).update({
                        appIdUsed: true
                    });
                    updateStatusMessage('App ID activated! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    updateStatusMessage('Invalid App ID or already used', 'warning');
                    useBtn.disabled = false;
                    useBtn.innerHTML = '<i class="fas fa-unlock-alt"></i> Use App ID';
                }
            } catch (error) {
                console.error('Error using App ID:', error);
                updateStatusMessage('Error activating App ID', 'warning');
                useBtn.disabled = false;
                useBtn.innerHTML = '<i class="fas fa-unlock-alt"></i> Use App ID';
            }
        }
        
        function copyAppId() {
            const appId = document.getElementById('appIdCode').textContent;
            navigator.clipboard.writeText(appId).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 2000);
                updateStatusMessage('App ID copied to clipboard!', 'success');
            }).catch(() => {
                updateStatusMessage('Failed to copy. Please copy manually.', 'warning');
            });
        }
        
        // Auto-check every 5 seconds
        checkInterval = setInterval(checkStatus, 5000);
        
        // Initial check
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUserId = user.uid;
                await checkStatus();
            } else {
                window.location.href = 'login.html';
            }
        });
        
        // Cleanup interval on page unload
        window.addEventListener('beforeunload', () => {
            if (checkInterval) {
                clearInterval(checkInterval);
            }
        });
    </script>
</body>
</html>
